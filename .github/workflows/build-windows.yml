name: Build Windows App

on:
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest # Nutzt einen Windows Server 2022 / Windows 11 von GitHub

    steps:
      - name: 📥 Code aus dem Repository laden
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Python-Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: ⚙️ Anwendung kompilieren (Dual-Build)
        # Baut die .exe Dateien für Windows
        run: python build.py

      - name: 📤 Artefakte (App) für Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: PDF-A11y-Converter-Windows
          path: dist/
          retention-days: 7
