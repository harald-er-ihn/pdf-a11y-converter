name: Build macOS App

on:
  # Erlaubt das manuelle Starten per Buttonklick im Browser
  workflow_dispatch: 

jobs:
  build-mac:
    runs-on: macos-latest # Nutzt einen Apple Mac von GitHub

    steps:
      - name: 📥 Code aus dem Repository laden
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🛠️ System-Abhängigkeiten installieren (für WeasyPrint)
        # WeasyPrint benötigt unter macOS zwingend Pango zur Text-Formatierung
        run: brew install pango libffi

      - name: 📦 Python-Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: ⚙️ Anwendung kompilieren (Dual-Build)
        # Ruft dein exzellentes build.py auf
        run: python build.py

      - name: 📤 Artefakte (App) für Download bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: PDF-A11y-Converter-macOS
          path: dist/
          retention-days: 7
